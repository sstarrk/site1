<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — DevOps Дневник</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }

    .title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #aaa; margin-bottom: 28px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 13px; font-weight: 500; color: #555; }

    input {
      padding: 10px 12px;
      border: 1px solid #ebebeb;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #aaa; }

    button {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }

    button:hover { background: #333; }

    .error {
      background: #fff5f5;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Вход</div>

    <div class="error" id="error">Неверный логин или пароль</div>

    <form action="/login" method="POST">
      <div class="field">
        <label>Логин</label>
        <input type="text" name="username" required />
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" name="password" required />
      </div>
      <button type="submit">Войти</button>
    </form>
  </div>
</body>
</html>
