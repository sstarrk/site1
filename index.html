<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Дневник</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
    }

    nav {
      border-right: 1px solid #ebebeb;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      background: #fff;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 200px;
    }

    .brand-title { font-size: 15px; font-weight: 600; }
    .brand-sub { font-size: 12px; color: #aaa; margin-top: 2px; }

    .nav-label {
      font-size: 11px; font-weight: 500; color: #bbb;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0 8px; margin-bottom: 6px;
    }

    .nav-section { display: flex; flex-direction: column; gap: 2px; }

    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 8px; border-radius: 7px;
      font-size: 13px; font-weight: 500; color: #555;
      text-decoration: none; transition: background 0.15s, color 0.15s;
    }

    .nav-link:hover { background: #f3f3f3; color: #111; }
    .nav-link.active { background: #f3f3f3; color: #111; }
    .nav-link .dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; flex-shrink: 0; }
    .nav-link.active .dot { background: #111; }

    .main { margin-left: 200px; padding: 40px 48px; }

    .topbar {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 36px;
    }

    .page-title { font-size: 20px; font-weight: 600; }
    .page-count { font-size: 13px; color: #aaa; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      background: #fff; border: 1px solid #ebebeb; border-radius: 12px;
      padding: 24px; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover { border-color: #d0d0d0; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }

    .card-header { display: flex; align-items: center; justify-content: space-between; }

    .card-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: #f5f5f5; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
    }

    .card-badge {
      font-size: 11px; font-weight: 500;
      padding: 3px 10px; border-radius: 20px;
    }

    .badge-link { background: #eff6ff; color: #3b82f6; }
    .badge-page { background: #f0fdf4; color: #16a34a; }

    .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
    .card-desc { font-size: 13px; color: #999; line-height: 1.6; }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; padding-top: 14px; border-top: 1px solid #f0f0f0;
    }

    .card-date { font-size: 12px; color: #bbb; }
    .card-arrow { font-size: 13px; color: #ccc; transition: color 0.15s, transform 0.15s; }
    .card:hover .card-arrow { color: #111; transform: translateX(2px); }

    @media (max-width: 640px) {
      nav { display: none; }
      .main { margin-left: 0; padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div>
      <div class="brand-title">Дневник</div>
      <div class="brand-sub">Практика</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Статьи</div>

      <!-- Добавляй ссылки сюда -->
      <a class="nav-link active" href="presentation.html">
        <span class="dot"></span> Презентация
      </a>

    </div>
  </nav>

  <main class="main">
    <div class="topbar">
      <span class="page-title">Все темы</span>
      <span class="page-count">1 статья</span>
    </div>

    <div class="grid">

      <!--
      =============================================
      ШАБЛОН КАРТОЧКИ — скопируй и измени:

      Ссылка на сайт/GitHub:
      <a class="card" href="https://github.com/..." target="_blank">
        <div class="card-header">
          <div class="card-icon">🔧</div>
          <span class="card-badge badge-link">Ссылка</span>
        </div>
        <div class="card-title">Название</div>
        <div class="card-desc">Описание</div>
        <div class="card-footer">
          <span class="card-date">Фев 2024</span>
          <span class="card-arrow">→</span>
        </div>
      </a>

      Своя HTML страница:
      <a class="card" href="articles/имя-файла.html">
        <div class="card-header">
          <div class="card-icon">📄</div>
          <span class="card-badge badge-page">Страница</span>
        </div>
        <div class="card-title">Название</div>
        <div class="card-desc">Описание</div>
        <div class="card-footer">
          <span class="card-date">Фев 2024</span>
          <span class="card-arrow">→</span>
        </div>
      </a>
      =============================================
      -->

      <a class="card" href="presentation.html">
        <div class="card-header">
          <div class="card-icon">📁</div>
          <span class="card-badge badge-page">Страница</span>
        </div>
        <div class="card-title">Презентация</div>
        <div class="card-desc">Презентация о DNS и портах</div>
        <div class="card-footer">
          <span class="card-date">Фев 2026</span>
          <span class="card-arrow">→</span>
        </div>
      </a>
    </div>
  </main>

</body>
</html>
